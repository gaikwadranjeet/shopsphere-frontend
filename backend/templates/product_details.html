{% extends "base.html" %}

{% block content %}

<section class="page-title">

    <h1>{{ product.name }}</h1>

</section>

<section class="product-card">

    <h2>{{ product.name }}</h2>

    <p><strong>Price:</strong> ₹{{ "{:,.0f}".format(product.price) }}</p>

    <p>{{ product.description }}</p>

    <br>

    <a href="/products" class="btn btn-primary">
        ← Back to Products
    </a>

</section>

{% endblock %}
